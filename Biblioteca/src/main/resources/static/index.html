<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Biblioteca Central</title>
    <link rel="stylesheet" href="css/css.css">
</head>
<body>

    <div class="contenedor-principal">
        <header class="cabecera">
            <h1>Sistema de Información Gerencial</h1>
            <h2>Biblioteca Central</h2>
        </header>

        <section class="panel-login">
            <h3>Acceso al Sistema</h3>
            
            <p id="mensajeError" style="color: red; display: none; margin-bottom: 15px; font-weight: bold;"></p>

            <form id="formLogin">
                <div class="grupo-input">
                    <label for="usuario">Usuario:</label>
                    <input type="text" id="usuario" name="usuario" required>
                </div>

                <div class="grupo-input">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn-ingresar">Ingresar</button>
            </form>
        </section>

        <footer class="pie-pagina">
            <p>© 2026 Equipo de Desarrollo - Proyecto POO</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
