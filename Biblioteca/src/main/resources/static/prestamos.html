<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préstamos - Biblioteca</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="layout">
<aside id="sidebar" class="sidebar"></aside>
    <main class="contenido-principal">
        <div class="page-header">
            <h1 class="page-header__titulo">Gestión de Préstamos</h1>
            <p class="page-header__subtitulo">Registro y seguimiento de préstamos</p>
        </div>

        <div class="seccion">
            <!-- Botones -->
            <div class= "seccion__titulos"; style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn btn--primario"   id="btn-registrar">Registrar</button>
                <button class="btn btn--secundario" id="btn-modificar">Modificar</button>
                <button class="btn btn--peligro"    id="btn-eliminar">Eliminar</button>
            </div>

            <!-- Registrar -->
            <div id="form-registrar">
                <h2 class="seccion__titulo" id="titulo-formulario">Registrar Préstamo</h2>
                <div class="form-grid">
                    <div class="form-grupo">
                        <label for="pre-estudiante">ID Estudiante</label>
                        <input type="number" id="pre-estudiante" placeholder="ID del estudiante">
                    </div>
                    <div class="form-grupo">
                        <label for="pre-libro">ID Libro</label>
                        <input type="number" id="pre-libro" placeholder="ID del libro">
                    </div>
                    <div class="form-grupo">
                        <label for="pre-fecha">Fecha Máx. Devolución</label>
                        <input type="date" id="pre-fecha">
                    </div>
                </div>
                <div class="form-acciones">
                    <button class="btn btn--primario"   id="btn-guardar-prestamo">Registrar Préstamo</button>
                    <button class="btn btn--secundario" id="btn-limpiar-prestamo">Limpiar</button>
                </div>
            </div>

            <!-- Eliminar -->
            <div id="form-eliminar" style="display:none;">
                <h2 class="seccion__titulo">Eliminar Préstamo</h2>
                <div class="form-grid">
                    <div class="form-grupo">
                        <label>ID Préstamo a eliminar</label>
                        <input type="number" id="elim-id" placeholder="ID del préstamo">
                    </div>
                </div>
                <div class="form-acciones">
                    <button class="btn btn--peligro" id="btn-confirmar-eliminar">Confirmar Eliminar</button>
                </div>
            </div>

            <!-- Modificar -->
            <div id="form-modificar" style="display:none;">
                <h2 class="seccion__titulo">Modificar Préstamo</h2>
                <div class="form-grid">
                    <div class="form-grupo">
                        <label>ID Préstamo</label>
                        <input type="number" id="mod-id" placeholder="ID a modificar">
                    </div>
                    <div class="form-grupo">
                        <label>Fecha Máx. Devolución</label>
                        <input type="date" id="mod-fecha">
                    </div>
                    <div class="form-grupo">
                        <label>Estado</label>
                        <select id="mod-estado">
                            <option value="">— Seleccionar —</option>
                            <option value="Activo">Activo</option>
                            <option value="Devuelto">Devuelto</option>
                            <option value="Mora">Mora</option>
                        </select>
                    </div>
                </div>
                <div class="form-acciones">
                    <button class="btn btn--primario"   id="btn-guardar-modificar">Guardar Cambios</button>
                    <button class="btn btn--secundario" id="btn-limpiar-modificar">Limpiar</button>
                </div>
            </div>
        </div>


        
        <!-- Tabla -->
        <div class="seccion">
            <h2 class="seccion__titulo">Listado de Préstamos</h2>
            <table class="tabla">
                <thead>
                    <tr>
                        <th>#</th><th>Estudiante</th><th>Libro</th><th>Atendido Por</th>
                        <th>Fecha Salida</th><th>Máx. Devolución</th><th>Entrega</th><th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-prestamos"></tbody>
            </table>
        </div>
    </main>
</div>
<script type="module" src="js/prestamos.js"></script>
</body>
</html>
