<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transacciones - Biblioteca</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="layout">

<aside id="sidebar" class="sidebar"></aside>

    <main class="contenido-principal">
        <div class="page-header">
            <h1 class="page-header__titulo">Transacciones y Sanciones</h1>
            <p class="page-header__subtitulo">Historial de moras y cobros registrados</p>
        </div>

            <!-- Formularios btns -->
        <div class="seccion">
<div class="seccion__titulo"; style="display:flex; gap:10px; margin-bottom:20px;">
    <button class="btn btn--primario"   id="btn-registrar">Registrar</button>
    <button class="btn btn--secundario" id="btn-modificar">Modificar</button>
    <button class="btn btn--peligro"    id="btn-eliminar">Eliminar</button>
</div>

         <div id="form-registrar">

        <!-- Formulario -->
            <h2 class="seccion__titulo" id="titulo-formulario">Registrar Transacción / Mora</h2>
            <div class="form-grid">
                <div class="form-grupo">
                    <label for="tra-prestamo">ID Préstamo</label>
                    <input type="number" id="tra-prestamo" placeholder="ID del préstamo">
                </div>
                <div class="form-grupo">
                    <label for="tra-mora">Mora ($)</label>
                    <input type="number" id="tra-mora" min="0" step="0.01" placeholder="0.00">
                </div>
                <div class="form-grupo" style="grid-column: 1 / -1;">
                    <label for="tra-detalle">Detalle</label>
                    <textarea id="tra-detalle" rows="2" placeholder="Descripción de la transacción..."></textarea>
                </div>
            </div>
            <div class="form-acciones">
                <button class="btn btn--primario" id="btn-guardar-transaccion">Registrar Transacción</button>
                <button class="btn btn--secundario" id="btn-limpiar-transaccion">Limpiar</button>
            </div>
        </div>
                <!-- Eliminar formulario -->
        <div id="form-eliminar" class="form-contenedor" style="display:none;">
            <h2 class="seccion__titulo">Eliminar Transacción</h2>
            <div class="form-grid">
                <div class="form-grupo">
                    <label>ID Transacción a eliminar</label>
                    <input type="number" id="elim-id" placeholder="ID de la transacción">
                </div>
            </div>
            <div class="form-acciones">
                <button class="btn btn--peligro" id="btn-confirmar-eliminar">Confirmar Eliminar</button>
            </div>
        </div>

        <!-- Modificar formulario -->
        <div id="form-modificar" class="form-contenedor" style="display:none;">
            <h2 class="seccion__titulo">Modificar Transacción</h2>
            <div class="form-grid">
                <div class="form-grupo">
                    <label>ID Transacción</label>
                    <input type="number" id="mod-id" placeholder="ID a modificar">
                </div>
                <div class="form-grupo">
                    <label>Mora ($)</label>
                    <input type="number" id="mod-mora" min="0" step="0.01" placeholder="0.00">
                </div>
                <div class="form-grupo" style="grid-column: 1 / -1;">
                    <label>Detalle</label>
                    <textarea id="mod-detalle" rows="2" placeholder="Descripción..."></textarea>
                </div>
            </div>
            <div class="form-acciones">
                <button class="btn btn--primario" id="btn-guardar-modificar">Guardar Cambios</button>
                <button class="btn btn--secundario" id="btn-limpiar-modificar">Limpiar</button>
            </div>
        </div>

    </div>


















        <!-- Tabla -->
        <!-- TODO (Backend): GET /api/transacciones -->
        <div class="seccion">
            <h2 class="seccion__titulo">Historial de Transacciones</h2>
            <table class="tabla">
                <thead>

                    <tr>
                        <th>#</th>
                        <th>Estudiante</th>
                        <th>Libro</th>
                        <th>Registrado Por</th>
                        <th>Mora</th>
                        <th>Fecha</th>
                        <th>Detalle</th>
                    </tr>

                </thead>
                <tbody id="tabla-transacciones">
                    <!-- transacciones.js inserta filas aquí -->
                </tbody>
            </table>
        </div>
    </main>

</div>
<script type="module" src="js/transacciones.js"></script>
</body>
</html>
