services:
  db-poo:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_poo
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Proyecto123#"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - red-proyecto
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Proyecto123#" -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend-poo:
    image: eclipse-temurin:25-jre
    container_name: springboot_poo
    ports:
      - "8080:8080"
    volumes:
      - ./Biblioteca/target/backend.jar:/app/backend.jar
    command: ["java", "-jar", "/app/backend.jar"]
    depends_on:
      db-poo:
        condition: service_healthy
    networks:
      - red-proyecto
    restart: on-failure

networks:
  red-proyecto:
    driver: bridge

volumes:
  sqldata:
  