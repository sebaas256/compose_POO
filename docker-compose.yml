version: '3.8'

services:
  # 1. Contenedor de Base de Datos
  db-poo:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_poo
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Proyecto123#"
    ports:
      - "1433:1433"
    networks:
      - red-proyecto

  # 2. Contenedor del Servidor Web
  web-poo:
    image: tomcat:10.1
    container_name: tomcat_poo
    ports:
      - "8080:8080"
    volumes:
      # Aqui se enlaza el archivo compilado de NetBeans (.war) hacia el contenedor.
      - ./proyecto_poo.war:/usr/local/tomcat/webapps/ROOT.war
    depends_on:
      - db-poo
    networks:
      - red-proyecto

networks:
  red-proyecto:
    driver: bridge
